name: release-drafter

on:
  workflow_call:
    secrets:
      SYSADMIN_PAT:
        required: true

jobs:
  release-drafter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: version.sbt
          sparse-checkout-cone-mode: false
          token: ${{ secrets.SYSADMIN_PAT }}

      - run: |
          versionString=$(awk '/ThisBuild \/ version := /{print $NF}' version.sbt)
          echo "VERSION=`echo ${versionString:1:-1} | sed 's/-SNAPSHOT//g'`" >> $GITHUB_ENV

      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          commitish: main
          name: "v${{ env.VERSION }}"
          tag: "v${{ env.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.SYSADMIN_PAT }}
