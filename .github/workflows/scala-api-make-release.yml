name: Scala API · Make Release (reusable)

# Reusable workflow v2 — invocar desde el repo cliente con:
#
#   on:
#     workflow_dispatch:
#   jobs:
#     make-release:
#       uses: BQN-UY/CI-CD/.github/workflows/scala-api-make-release.yml@v2
#       secrets: inherit
#
# Sólo desde release/** o hotfix/**.
# Tag final vX.Y.Z + GH release + back-merge a develop + reset .github/next-bump.
# NO publica a Nexus (server apps usan GH Releases).
# NO deploya (ver docs/v2-sin-jenkins-roadmap.md Hito 3).

on:
  workflow_call:
    inputs:
      java-version:
        description: Versión de Java para sbt
        required: false
        type: string
        default: "21"

jobs:
  release:
    name: Tag final + GH release + back-merge + reset next-bump
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/')
    permissions:
      contents: write             # crear tags, pushear ramas, commit del reset de next-bump
      security-events: write      # upload de SARIF al tab de Security
    env:
      TZ: America/Montevideo
      # sbt resuelve dependencias desde el Nexus privado BQN.
      # NO publicamos a Nexus pero sí descargamos libs internas.
      NEXUS_USER:     ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: BQN-UY/CI-CD/.github/actions/backend/scala/lint-build@v2
        with:
          java-version: ${{ inputs.java-version }}

      - uses: BQN-UY/CI-CD/.github/actions/shared/security-scan@v2

      - name: Extraer versión final desde nombre de rama
        id: version
        shell: bash
        run: |
          # release/vX.Y.Z → vX.Y.Z; hotfix/vX.Y.Z-desc → vX.Y.Z
          VERSION=$(echo "${{ github.ref_name }}" | grep -oP '(?<=/)v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "Error: no se pudo extraer versión desde '${GITHUB_REF_NAME}'. Formato esperado: release/vX.Y.Z o hotfix/vX.Y.Z-desc" >&2
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Crear tag SemVer final
        uses: BQN-UY/CI-CD/.github/actions/shared/semver-tag@v2
        with:
          tag: ${{ steps.version.outputs.tag }}

      - name: sbt assembly
        shell: bash
        run: sbt assembly

      - name: Localizar y renombrar JAR
        id: jar
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          JAR=$(find target -maxdepth 3 -type f -name '*.jar' \
                  ! -name '*-sources.jar' ! -name '*-javadoc.jar' \
                  | head -1)
          if [ -z "$JAR" ] || [ ! -f "$JAR" ]; then
            echo "Error: no se encontró JAR assembly en target/" >&2
            exit 1
          fi
          VERSION=${TAG#v}
          DEST="${RUNNER_TEMP}/${REPO_NAME}-${VERSION}.jar"
          cp "$JAR" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Crear GitHub Release final
        uses: BQN-UY/CI-CD/.github/actions/shared/github-release@v2
        with:
          tag: ${{ steps.version.outputs.tag }}
          prerelease: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adjuntar JAR al release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          JAR: ${{ steps.jar.outputs.path }}
        run: gh release upload "$TAG" "$JAR" --clobber

      - name: Merge release → main
        uses: BQN-UY/CI-CD/.github/actions/shared/git-merge@v2
        with:
          source: ${{ github.ref_name }}
          target: main

      - name: Back-merge main → develop
        uses: BQN-UY/CI-CD/.github/actions/shared/git-merge@v2
        with:
          source: main
          target: develop

      - name: Reset .github/next-bump a 'minor' en develop
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin develop
          git checkout develop
          git pull --ff-only origin develop
          CURRENT=""
          [ -f .github/next-bump ] && CURRENT=$(cat .github/next-bump | tr -d '[:space:]')
          if [ "$CURRENT" = "minor" ]; then
            echo "next-bump ya está en 'minor', nada que resetear"
            exit 0
          fi
          mkdir -p .github
          echo "minor" > .github/next-bump
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/next-bump
          git commit -m "chore: reset .github/next-bump a 'minor' tras ${{ steps.version.outputs.tag }}"
          git push origin develop
