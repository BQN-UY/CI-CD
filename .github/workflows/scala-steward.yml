name: Scala Steward — dependencias internas

# Actualiza dependencias com.bqn y com.zistemas en todos los repos de la org.
# Las dependencias públicas (Maven Central) son responsabilidad de Dependabot.
#
# Cuenta de servicio: bqn-sysadmin (PAT almacenado en SCALA_STEWARD_GITHUB_TOKEN)
#
# Requisitos:
#   SCALA_STEWARD_GITHUB_TOKEN — org secret — PAT de bqn-sysadmin con scope: repo
#   NEXUS_USER                 — org secret — usuario Nexus (acceso de lectura)
#   NEXUS_PASSWORD             — org secret — contraseña Nexus
#   vars.NEXUS_URL             — org variable — URL base del Nexus privado (no es secret)

on:
  schedule:
    - cron: "0 7 * * 1"   # cada lunes a las 7:00 UTC
  workflow_dispatch:        # permite ejecución manual

jobs:
  scala-steward:
    name: Actualizar dependencias internas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token:     ${{ secrets.SCALA_STEWARD_GITHUB_TOKEN }}
          repos-file:       scala-steward/repos.md
          branches:         develop
          labels:           update
          sign-commits:     "false"
          coursier-credentials: |
            ${{ vars.NEXUS_URL }} realm=Sonatype Nexus Repository Manager username=${{ secrets.NEXUS_USER }} password=${{ secrets.NEXUS_PASSWORD }}
