name: Scala API · Publish snapshot (reusable)

# Reusable workflow v2 — invocar desde el repo cliente con:
#
#   on:
#     push:
#       branches: [develop, "release/**", "hotfix/**"]
#   jobs:
#     publish:
#       uses: BQN-UY/CI-CD/.github/workflows/scala-api-publish.yml@v2
#       secrets: inherit
#
# Publica el JAR snapshot a Nexus. NO hace deploy — el deploy es
# responsabilidad del workflow GA-native cuando esté disponible
# (ver docs/v2-sin-jenkins-roadmap.md, Hito 3).

on:
  workflow_call:
    inputs:
      java-version:
        description: Versión de Java para sbt
        required: false
        type: string
        default: "21"

jobs:
  publish:
    name: Publish JAR snapshot → Nexus
    runs-on: ubuntu-latest
    env:
      TZ: America/Montevideo
      NEXUS_USER: ${{ secrets.NEXUS_USER }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # sbt-dynver necesita historial Git completo

      - uses: BQN-UY/CI-CD/.github/actions/backend/scala/lint-build@v2
        with:
          java-version: ${{ inputs.java-version }}

      - name: Publish snapshot to Nexus
        shell: bash
        run: sbt publish
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
