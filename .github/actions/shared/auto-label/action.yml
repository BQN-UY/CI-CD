name: Auto label
description: Asigna automáticamente una label al PR según el prefijo del branch

inputs:
  github-token:
    description: GITHUB_TOKEN del repo que invoca
    required: true

runs:
  using: composite
  steps:
    - name: Assign label from branch prefix
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const pr = context.payload.pull_request;

          if (!pr?.head?.ref) {
            console.log("Auto label: contexto sin 'pull_request' (este action está pensado para eventos 'pull_request'/'pull_request_target'); se omite auto-label.");
            return;
          }

          const headRepo = pr.head.repo;
          const thisRepoFullName = `${context.repo.owner}/${context.repo.repo}`;
          if (!headRepo || headRepo.fork || headRepo.full_name !== thisRepoFullName) {
            console.log(`Auto label: PR desde fork u otro repo (${headRepo?.full_name ?? 'desconocido'}) — se omite auto-label para evitar usar tokens con permisos elevados en PRs de forks.`);
            return;
          }

          const branch = pr.head.ref;
          const map = {
            'feature/':        'feature',
            'fix/':            'fix',
            'chore/':          'chore',
            'docs/':           'chore',
            'refactor/':       'chore',
            'hotfix/':         'fix',
            'release/':        'deploy-action',
            'dependabot/':     'deps',
            'scala-steward/':  'deps',
            'update/':         'deps',   // prefijo default de Scala Steward
          };
          const managedLabels = new Set(Object.values(map));
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const issue_number = pr.number;

          const existingLabelsResponse = await github.rest.issues.listLabelsOnIssue({
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existingManaged = existingLabelsResponse.data
            .map(l => l.name)
            .filter(name => managedLabels.has(name));

          if (existingManaged.length > 0) {
            console.log(`Auto label: el PR ya tiene label(s) gestionada(s) (${existingManaged.join(', ')}) — se omite auto-label para no romper 'label-check'.`);
            return;
          }

          const label = Object.entries(map).find(([k]) => branch.startsWith(k))?.[1];
          if (label) {
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [label] });
            console.log(`Label '${label}' asignada al PR (branch: ${branch})`);
          } else {
            console.log(`Branch '${branch}' no coincide con ningún prefijo conocido — se omite auto-label`);
          }
