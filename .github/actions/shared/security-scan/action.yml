name: Security scan
description: Semgrep (SAST) + BetterLeaks (secrets)

runs:
  using: composite
  steps:
    - name: Semgrep SAST
      shell: bash
      run: |
        set -euo pipefail
        pip install "semgrep>=1.50.0,<2.0.0" --quiet
        SEMGREP_EXIT=0
        semgrep scan --config auto . \
          --output results-sast.sarif --sarif || SEMGREP_EXIT=$?
        if [ ! -f results-sast.sarif ]; then
          echo "Error: results-sast.sarif was not generated by Semgrep SAST scan." >&2
          exit 1
        fi
        exit $SEMGREP_EXIT

    - name: Upload SARIF
      id: upload_sarif
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results-sast.sarif
      # continue-on-error tolera repos sin permissions: security-events: write.
      # Errores de red o SARIF inválido también quedan silenciados aquí;
      # el análisis Semgrep ya falló correctamente en el step anterior si hubo hallazgos.
      continue-on-error: true

    - name: BetterLeaks
      shell: bash
      run: |
        set -euo pipefail
        # Ensure BetterLeaks has access to full git history to avoid false negatives
        if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
          echo "Repository is shallow; fetching full history for BetterLeaks..." >&2
          git fetch --unshallow --tags --prune --no-recurse-submodules 2>/dev/null || \
          git fetch --depth=2147483647 --tags --prune --no-recurse-submodules || {
            echo "Error: unable to fetch full git history required by BetterLeaks." >&2
            echo "Configure actions/checkout with 'fetch-depth: 0' in this workflow." >&2
            exit 1
          }
        fi
        pip install betterleaks==1.6.0 --quiet
        betterleaks scan --fail-on-findings .
