name: Security scan
description: Semgrep (SAST) + detect-secrets (secrets)

runs:
  using: composite
  steps:
    - name: Semgrep SAST
      shell: bash
      run: |
        set -euo pipefail
        pip install "semgrep>=1.50.0,<2.0.0" --quiet
        SEMGREP_EXIT=0
        semgrep scan --config auto . \
          --output results-sast.sarif --sarif || SEMGREP_EXIT=$?
        if [ ! -f results-sast.sarif ]; then
          echo "Error: results-sast.sarif was not generated by Semgrep SAST scan." >&2
          exit 1
        fi
        exit $SEMGREP_EXIT

    - name: Upload SARIF
      id: upload_sarif
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results-sast.sarif
      # continue-on-error tolera repos sin permissions: security-events: write.
      # Errores de red o SARIF inválido también quedan silenciados aquí;
      # el análisis Semgrep ya falló correctamente en el step anterior si hubo hallazgos.
      continue-on-error: true

    - name: Secrets scan
      shell: bash
      run: |
        set -euo pipefail
        # Ensure detect-secrets has access to full git history to avoid false negatives
        if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
          echo "Repository is shallow; fetching full history for secrets scan..." >&2
          git fetch --unshallow --tags --prune --no-recurse-submodules 2>/dev/null || \
          git fetch --depth=2147483647 --tags --prune --no-recurse-submodules || {
            echo "Error: unable to fetch full git history required for secrets scan." >&2
            echo "Configure actions/checkout with 'fetch-depth: 0' in this workflow." >&2
            exit 1
          }
        fi
        pip install "detect-secrets>=1.4.0,<2.0.0" --quiet
        # Excluir .git/ (artefactos del clone) y .github/workflows/ (refs ${{ secrets.X }}
        # que detect-secrets clasifica como high-entropy strings).
        detect-secrets scan --all-files . \
          --exclude-files '^\.git/' \
          --exclude-files '^\.github/workflows/' \
          > secrets-baseline.json
        python3 -c "
        import json, sys
        data = json.load(open('secrets-baseline.json'))
        findings = data.get('results', {})
        if findings:
            print(f'Secrets found in {len(findings)} file(s):', file=sys.stderr)
            for f in findings:
                print(f'  {f}', file=sys.stderr)
            sys.exit(1)
        print('No secrets found.')
        "
