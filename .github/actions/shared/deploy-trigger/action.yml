name: Deploy trigger
description: Dispara deploy vía webhook configurable por repo

inputs:
  environment:
    description: dev | staging | production
    required: true
  service-url:
    description: URL del webhook de deploy
    required: true
  token:
    description: Token de autenticación
    required: true

runs:
  using: composite
  steps:
    - name: Trigger deploy
      shell: bash
      run: |
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST "${{ inputs.service-url }}" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
            "environment": "${{ inputs.environment }}",
            "ref": "${{ github.sha }}",
            "actor": "${{ github.actor }}"
          }')
        if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "204" ]; then
          echo "Webhook failed — HTTP $HTTP_STATUS"
          exit 1
        fi
