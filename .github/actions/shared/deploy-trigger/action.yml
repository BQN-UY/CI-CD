name: Deploy trigger
description: Dispara deploy vía webhook configurable por repo

inputs:
  environment:
    description: testing | staging | production
    required: true
  service-url:
    description: URL del webhook de deploy
    required: true
  token:
    description: Token de autenticación
    required: true

runs:
  using: composite
  steps:
    - name: Trigger deploy
      shell: bash
      run: |
        # Normalizar alias obsoleto
        ENV="${{ inputs.environment }}"
        if [ "$ENV" = "dev" ]; then
          echo "Warning: 'dev' es un alias obsoleto — usar 'testing'. El valor se normaliza a 'testing'." >&2
          ENV="testing"
        fi

        # Validar ambiente
        case "$ENV" in
          testing|staging|production) ;;
          *)
            echo "Error: invalid environment '$ENV'. Expected one of: testing, staging, production." >&2
            exit 1
            ;;
        esac

        # No usar --retry-all-errors en POST para evitar múltiples deploys
        # ante timeouts o errores 5xx en webhooks no idempotentes.
        # Solo se reintenta ante errores de conexión (--retry maneja CURLE_* codes).
        RESPONSE_BODY=$(mktemp)
        HTTP_STATUS=$(curl -s -w "%{http_code}" -o "$RESPONSE_BODY" \
          --connect-timeout 10 \
          --max-time 30 \
          --retry 3 \
          -X POST "${{ inputs.service-url }}" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"environment\": \"$ENV\",
            \"ref\": \"${{ github.sha }}\",
            \"actor\": \"${{ github.actor }}\"
          }")
        if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "204" ]; then
          echo "Webhook failed — HTTP $HTTP_STATUS" >&2
          echo "Response body: $(cat "$RESPONSE_BODY" | head -c 500)" >&2
          rm -f "$RESPONSE_BODY"
          exit 1
        fi
        rm -f "$RESPONSE_BODY"
