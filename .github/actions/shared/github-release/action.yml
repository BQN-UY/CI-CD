name: GitHub Release
description: Crea release con notas autogeneradas desde PRs

inputs:
  tag:
    description: Tag a publicar
    required: true

runs:
  using: composite
  steps:
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        generate_release_notes: true
        make_latest: true
