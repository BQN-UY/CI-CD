name: Deploy

# Caller del reusable workflow de deploy v2 (GA-native, sin Jenkins).
#
# Requisitos del repo caller:
#   - Tener `.github/deploy.json` válido (ver docs/deploy-json-schema.md).
#   - Org var `PORTAINER_URL` y org secrets aprovisionados por Fase 0
#     (BQN-UY/CI-CD#95): PORTAINER_TOKEN_DEPLOY,
#     GCHAT_WEBHOOK_PRODUCTION, GCHAT_WEBHOOK_TESTING_STAGING.
#   - GH Environments `testing`/`staging`/`production` con required reviewers
#     en production.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente destino
        type: choice
        options: [testing, staging, production]
        required: true
      version:
        description: Tag del GH Release a deployar (ej. v1.2.0-snapshot.003, v1.2.0-rc.001, v1.2.0)
        type: string
        required: true
      installations:
        description: Instalaciones destino (coma-separado). Vacío = todas con auto_deploy=true.
        type: string
        required: false
        default: ""

  # Auto-deploy según convención de versionado v2:
  #   v*-snapshot.NNN → testing   (auto)
  #   v*-rc.NNN       → staging   (auto)
  #   vX.Y.Z (final)  → production (siempre manual via workflow_dispatch)
  release:
    types: [published]

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && (
        contains(github.event.release.tag_name, '-snapshot.') ||
        contains(github.event.release.tag_name, '-rc.')
      ))
    uses: BQN-UY/CI-CD/.github/workflows/scala-api-deploy.yml@v2
    with:
      environment: >-
        ${{ github.event_name == 'workflow_dispatch' && inputs.environment
            || (contains(github.event.release.tag_name, '-snapshot.') && 'testing' || 'staging') }}
      version: >-
        ${{ github.event_name == 'workflow_dispatch' && inputs.version
            || github.event.release.tag_name }}
      installations: >-
        ${{ github.event_name == 'workflow_dispatch' && inputs.installations || '' }}
    secrets:
      PORTAINER_TOKEN_DEPLOY:        ${{ secrets.PORTAINER_TOKEN_DEPLOY }}
      GCHAT_WEBHOOK_PRODUCTION:      ${{ secrets.GCHAT_WEBHOOK_PRODUCTION }}
      GCHAT_WEBHOOK_TESTING_STAGING: ${{ secrets.GCHAT_WEBHOOK_TESTING_STAGING }}
